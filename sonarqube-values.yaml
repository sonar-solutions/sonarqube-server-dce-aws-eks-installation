# SonarQube Data Center Edition (DCE) Helm Values
# Topology: 2 Application Nodes + 3 Search Nodes
# AZ affinity is injected dynamically by Terraform

# ─────────────────────────────────────────────────────────────────────────────
# Application Nodes  (stateless — web process + compute engine)
# ─────────────────────────────────────────────────────────────────────────────
ApplicationNodes:
  replicaCount: 2

  image:
    repository: sonarqube
    pullPolicy: IfNotPresent

  # jwtSecret: injected by Terraform (base64-encoded random string)
  # affinity:  injected by Terraform (topology.kubernetes.io/zone → AZ[0])

  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]

  resources:
    limits:
      cpu: 800m
      memory: 6144M
      ephemeral-storage: 512000M
    requests:
      cpu: 400m
      memory: 2048M
      ephemeral-storage: 1536M

  readinessProbe:
    exec:
      command:
        - sh
        - -c
        - |
          #!/bin/bash
          # Ready when status is UP, DB_MIGRATION_NEEDED, or DB_MIGRATION_RUNNING
          if curl --noproxy '*' -s "http://localhost:9000/api/system/status" | \
             grep -q -e '"status":"UP"' \
                     -e '"status":"DB_MIGRATION_NEEDED"' \
                     -e '"status":"DB_MIGRATION_RUNNING"'; then
            exit 0
          fi
          exit 1
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 6
    timeoutSeconds: 1

  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - |
          curl --noproxy '*' --silent -o /dev/null --max-time 1 \
            -H "X-Sonar-Passcode: $SONAR_WEB_SYSTEMPASSCODE" \
            "http://localhost:9000/api/system/liveness"
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 6
    timeoutSeconds: 1

  startupProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 24
    timeoutSeconds: 1

  annotations: {}
  podLabels: {}
  tolerations: []
  nodeSelector: {}
  hostAliases: []

  extraConfig:
    secrets: []
    configmaps:
      - sonarqube-opts

  extraInitContainers: {}
  extraContainers: []
  extraVolumes: []
  extraVolumeMounts: []

# ─────────────────────────────────────────────────────────────────────────────
# Search Nodes  (Elasticsearch cluster — 3 nodes required for quorum)
# ─────────────────────────────────────────────────────────────────────────────
searchNodes:
  replicaCount: 3

  image:
    repository: sonarqube
    pullPolicy: IfNotPresent

  # affinity: injected by Terraform (topology.kubernetes.io/zone → AZ[0])

  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]

  resources:
    limits:
      cpu: 800m
      memory: 4096M
      ephemeral-storage: 512000M
    requests:
      cpu: 400m
      memory: 2048M
      ephemeral-storage: 1536M

  annotations: {}
  podLabels: {}
  tolerations: []
  nodeSelector: {}

  persistence:
    enabled: false
    annotations: {}
    storageClass:
    accessMode: ReadWriteOnce
    size: 5Gi
    uid: 1000
    guid: 0

  extraVolumes: []
  extraVolumeMounts: []

# ─────────────────────────────────────────────────────────────────────────────
# Shared / Common Configuration
# ─────────────────────────────────────────────────────────────────────────────
elasticsearch:
  # (DEPRECATED) Use initSysctl.enabled instead
  configureNode: false
  bootstrapChecks: true

service:
  type: ClusterIP
  externalPort: 9000
  internalPort: 9000
  labels:
  annotations: {}

httpProxySecret: ""
httpProxy: ""
httpsProxy: ""
noProxy: ""

# Optionally create Network Policies
networkPolicy:
  enabled: false
  prometheusNamespace: "monitoring"

sonarWebContext: ""

ingress:
  enabled: false  # NLB is provisioned via Service annotations (not Ingress); see main.tf

securityContext:
  fsGroup: 0

initContainers:
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
  resources: {}

initSysctl:
  enabled: true
  vmMaxMapCount: 524288
  fsFileMax: 131072
  nofile: 131072
  nproc: 8192
  securityContext:
    privileged: true
    runAsUser: 0
    readOnlyRootFilesystem: true

initFs:
  enabled: true
  securityContext:
    privileged: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: ["ALL"]
      add: ["CHOWN"]
    readOnlyRootFilesystem: true

caCerts:
  enabled: false

prometheusExporter:
  enabled: false
  version: "0.17.2"
  noCheckCertificate: false
  webBeanPort: 8000
  ceBeanPort: 8001
  config:
    rules:
      - pattern: ".*"

prometheusMonitoring:
  podMonitor:
    enabled: false
    interval: 30s

plugins:
  install: []
  noCheckCertificate: false

# (DEPRECATED) Use SONAR_WEB_JAVAOPTS directly
jvmOpts: ""
# (DEPRECATED) Use SONAR_CE_JAVAOPTS directly
jvmCeOpts: ""

monitoringPasscodeSecretName: "sonarqube-eks-monitoring-password"
monitoringPasscodeSecretKey: "password"

annotations: {}

jdbcOverwrite:
  enabled: true
  jdbcSecretName: "sonarqube-eks-db-password"
  jdbcSecretPasswordKey: "password"

postgresql:
  enabled: false

podLabels: {}

persistence:
  enabled: false
  annotations: {}
  storageClass:
  accessMode: ReadWriteOnce
  size: 5Gi
  uid: 1000
  guid: 0
  volumes: []
  mounts: []

emptyDir: {}

tests:
  image: ""
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 200M
      ephemeral-storage: 100M
    limits:
      cpu: 500m
      memory: 200M
      ephemeral-storage: 1000M

terminationGracePeriodSeconds: 60
